on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    strategy:
      fail-fast: false
      matrix:
        include:
          - shield: charybdis_left
            board: nice_nano_v2
          - shield: charybdis_right
            board: nice_nano_v2
          - shield: settings_reset
            board: nice_nano_v2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West init
        run: west init -l config

      - name: West update
        run: west update

      - name: West zephyr-export
        run: west zephyr-export

      - name: Build (${{ matrix.shield }})
        run: |
          west build -s zmk/app -b ${{ matrix.board }} \
            -- -DSHIELD=${{ matrix.shield }} \
               -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename artifact
        run: |
          mkdir -p artifacts
          cp build/zephyr/zmk.uf2 artifacts/${{ matrix.shield }}-${{ matrix.board }}-zmk.uf2

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.shield }}-${{ matrix.board }}-zmk
          path: artifacts/
